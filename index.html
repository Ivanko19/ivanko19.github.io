<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍷 date request</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top, rgba(120,0,0,0.35), transparent 50%),
    radial-gradient(circle at bottom, rgba(0,0,0,0.9), transparent 60%),
    linear-gradient(135deg,#1a0000,#2b0a0a,#0a0000);
    color:#f5e9e2;
    overflow:hidden;
}

/* floating glow */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    opacity:0.2;
}

/* MAIN CARD */
.card{
    width:92%;
    max-width:520px;
    padding:36px;
    border-radius:24px;

    background:rgba(30,10,10,0.55);
    backdrop-filter: blur(16px);

    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
        0 20px 80px rgba(0,0,0,0.6),
        inset 0 0 40px rgba(255,0,0,0.05);

    text-align:center;
    position:relative;
}

/* TITLE */
h1{
    font-size:2rem;
    font-weight:700;
    color:#ffd7c2;
    margin-bottom:8px;
}

/* subtitle */
.subtitle{
    font-size:0.95rem;
    opacity:0.85;
    margin-bottom:20px;
}

/* stats box */
.fun{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.06);
    padding:14px;
    border-radius:14px;
    font-size:0.85rem;
    margin-bottom:20px;
    line-height:1.6;
}

/* inputs */
input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.07);
    color:white;
    font-size:0.95rem;
}

/* BUTTON AREA */
.buttons{
    margin-top:22px;
    height:70px;
    position:relative;
}

/* buttons */
button{
    padding:12px 24px;
    border:none;
    border-radius:999px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
    position:absolute;
}

/* YES */
.yes{
    left:20px;
    bottom:10px;
    background:linear-gradient(135deg,#8a1f1f,#ff3b3b);
    color:white;
    box-shadow:0 10px 20px rgba(255,0,0,0.2);
}

.yes:hover{
    transform:scale(1.05);
}

/* NO */
.no{
    right:20px;
    bottom:10px;
    background:rgba(255,255,255,0.08);
    color:#ffe2d6;
}

/* SUCCESS */
.success{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:1.8rem;
    font-weight:700;
    display:none;
    color:#ffd7c2;
    animation:pop 0.5s ease;
}

@keyframes pop{
    from{transform:translate(-50%,-50%) scale(0);}
    to{transform:translate(-50%,-50%) scale(1);}
}

</style>

</head>

<body>

<div class="card">

    <h1>🍷 date request</h1>

    <div class="subtitle">
        минимален риск, максимален cringe 😌
    </div>

    <div class="fun">
        😂 awkward level: low<br>
        ☕ caffeine dependency: high<br>
        🧠 braincells: unstable but functional
    </div>

    <input type="date">
    <input type="time">

    <div class="buttons" id="area">

        <button class="yes" id="yesBtn">yes 😌</button>
        <button class="no" id="noBtn">no 🙃</button>

    </div>

    <div class="success" id="success">🎉 IT'S A DATE!</div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const area = document.getElementById("area");
const success = document.getElementById("success");

/* 😂 AI NO BUTTON (clean movement) */
noBtn.addEventListener("mouseover", (e) => {

    const rect = area.getBoundingClientRect();

    const maxX = rect.width - 90;
    const maxY = rect.height - 40;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

/* 🎉 YES ANIMATION */
yesBtn.addEventListener("click", () => {

    success.style.display = "block";

    setTimeout(() => {
        success.style.display = "none";
    }, 2000);
});

</script>

</body>
</html>
