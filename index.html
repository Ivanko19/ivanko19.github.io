<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍷 date request</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2a0000,#3b0a0a,#120000);
    color:#f5e9e2;
}

.card{
    width:90%;
    max-width:520px;
    background:rgba(70,10,10,0.65);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 50px rgba(0,0,0,0.6);
}

h1{
    margin-bottom:10px;
    color:#ffd6c2;
}

.subtitle{
    margin-bottom:20px;
    opacity:0.9;
}

.fun{
    background:rgba(255,255,255,0.06);
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    font-size:0.9rem;
}

label{
    display:block;
    margin-top:10px;
    text-align:left;
    font-size:0.9rem;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
}

.buttons{
    margin-top:20px;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:999px;
    margin:5px;
    cursor:pointer;
    font-weight:bold;
}

.yes{
    background:#7a1f1f;
    color:white;
}

.no{
    background:rgba(255,255,255,0.1);
    color:#ffe2d6;
}

.footer{
    margin-top:20px;
    font-size:0.8rem;
    opacity:0.7;
}

</style>

</head>

<body>

<div class="card">

    <h1>🍷 date request</h1>

    <div class="subtitle">
        След дълго мислене… те каня на среща.
    </div>

    <div class="fun">
        📊 awkward level: 42%<br>
        🧠 braincells: low battery<br>
        ☕ caffeine: required
    </div>

    <label>📅 дата</label>
    <input type="date">

    <label>⏰ час</label>
    <input type="time">

    <div class="buttons">
        <button class="yes">yes 😌</button>
        <button class="no">no 🙃</button>
    </div>

    <div class="footer">
        обещавам да не е cringe (100% no guarantee)
    </div>

</div>

</body>
</html>
