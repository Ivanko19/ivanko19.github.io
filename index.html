
<!DOCTYPE html>
<html lang="bg">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Date.exe 😂❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* animated blobs */

.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.6;
    animation:move 15s infinite alternate ease-in-out;
}

.blob1{
    width:350px;
    height:350px;
    background:#ff0080;
    top:-100px;
    left:-100px;
}

.blob2{
    width:300px;
    height:300px;
    background:#7c3aed;
    bottom:-100px;
    right:-100px;
    animation-delay:3s;
}

.blob3{
    width:250px;
    height:250px;
    background:#00d4ff;
    bottom:20%;
    left:20%;
    animation-delay:6s;
}

@keyframes move{
    from{
        transform:translate(0,0) scale(1);
    }

    to{
        transform:translate(100px,-50px) scale(1.2);
    }
}

/* card */

.card{
    width:90%;
    max-width:600px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
    z-index:10;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

.meme{
    font-size:1.1rem;
    opacity:0.9;
    margin-bottom:25px;
    line-height:1.7;
}

img{
    width:180px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.calendar{
    margin-top:20px;
    text-align:left;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    margin-bottom:18px;
    font-size:1rem;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
    position:relative;
}

button{
    border:none;
    padding:15px 30px;
    border-radius:999px;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
    font-weight:700;
}

.yes{
    background:#22c55e;
    color:white;
}

.yes:hover{
    transform:scale(1.08);
}

.no{
    background:#ef4444;
    color:white;
    position:absolute;
    right:0;
}

.result{
    margin-top:25px;
    font-size:1.3rem;
    display:none;
    line-height:1.8;
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.floating{
    position:absolute;
    font-size:24px;
    animation:float 8s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(100vh) rotate(0deg);
    }

    to{
        transform:translateY(-120px) rotate(360deg);
    }
}

/* mobile */

@media(max-width:600px){

    h1{
        font-size:2.1rem;
    }

    .card{
        padding:25px;
    }

    .meme{
        font-size:1rem;
    }

    img{
        width:140px;
    }
}

</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">

    <h1>Date.exe ❤️😂</h1>

    <img src="https://i.imgur.com/6VBx3io.jpeg" alt="meme">

    <div class="meme">
        След внимателен scientific analysis,<br>
        ChatGPT заключи че трябва да излезем 🤝<br><br>

        Моля избери дата и час за нашата legendary среща.
    </div>

    <div class="calendar">

        <label>📅 Избери дата</label>
        <input type="date" id="date">

        <label>⏰ Избери час</label>
        <input type="time" id="time">

    </div>

    <div class="buttons">

        <button class="yes" id="yesBtn">
            Потвърди 😎
        </button>

        <button class="no" id="noBtn">
            Не 😭
        </button>

    </div>

    <div class="result" id="result"></div>

</div>

<script>

const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');
const result = document.getElementById('result');

const funnyMessages = [
    "Сигурна ли си? 😭",
    "Аз вече казах на майка ми 😂",
    "Nice try 😎",
    "Error 404: rejection not found",
    "AI predicts YES 🤖"
];

noBtn.addEventListener('mouseover', () => {

    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;

    noBtn.innerText =
        funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
});

yesBtn.addEventListener('click', () => {

    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;

    if(!date || !time){
        alert("Избери дата и час first 😭");
        return;
    }

    result.style.display = 'block';

    result.innerHTML = `
        🚀 Срещата е confirmed.<br><br>

        📅 ${date}<br>
        ⏰ ${time}<br><br>

        Prepare yourself for:<br>
        awkward eye contact,<br>
        elite memes<br>
        и overpriced кафе ☕😂
    `;
});

/* floating emojis */

const emojis = ["❤️","😂","☕","✨","😎","💀"];

setInterval(() => {

    const el = document.createElement('div');

    el.classList.add('floating');

    el.innerHTML =
        emojis[Math.floor(Math.random()*emojis.length)];

    el.style.left = Math.random() * 100 + 'vw';

    el.style.fontSize =
        (Math.random()*20 + 20) + 'px';

    document.body.appendChild(el);

    setTimeout(() => {
        el.remove();
    }, 8000);

}, 500);

</script>

</body>
</html>
