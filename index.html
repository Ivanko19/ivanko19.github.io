<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Официална покана 👀 ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ===== EMO DARK BACKGROUND ===== */
body{
    height:100vh;
    overflow:hidden;
    background:
    radial-gradient(circle at top left, rgba(122,92,255,0.22), transparent 30%),
    radial-gradient(circle at bottom right, rgba(255,76,145,0.18), transparent 35%),
    radial-gradient(circle at center, rgba(70,90,255,0.12), transparent 40%),
    linear-gradient(135deg,#0f0f17,#151521,#1d1b2e);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#e8e8ee;
    position:relative;
}

/* subtle moving noise */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    animation:moveBg 30s linear infinite;
    opacity:0.25;
}

@keyframes moveBg{
    from{ transform:translate(0,0); }
    to{ transform:translate(-120px,-80px); }
}

/* ===== 3D EMO CREATURES ===== */

.creature{
    position:absolute;
    font-size:80px;
    opacity:0.25;
    filter:drop-shadow(0 0 25px rgba(255,255,255,0.08));
    animation:floatCreature 8s ease-in-out infinite;
    user-select:none;
    pointer-events:none;
    z-index:1;
}

.raven{
    left:6%;
    top:18%;
    transform:rotate(-12deg);
}

.owl{
    right:6%;
    bottom:15%;
    transform:rotate(10deg);
    animation-delay:2s;
}

@keyframes floatCreature{
    0%{
        transform:translateY(0px) scale(1) rotate(0deg);
    }
    50%{
        transform:translateY(-18px) scale(1.08) rotate(5deg);
    }
    100%{
        transform:translateY(0px) scale(1) rotate(0deg);
    }
}

/* ===== HEARTS ===== */
.heart{
    position:absolute;
    color:#ff7eb6;
    opacity:0.08;
    animation:float 12s linear infinite;
    user-select:none;
    text-shadow:0 0 15px rgba(255,126,182,0.4);
}

@keyframes float{
    from{ transform:translateY(100vh) rotate(0deg); }
    to{ transform:translateY(-120px) rotate(360deg); }
}

/* ===== CARD ===== */
.card{
    width:90%;
    max-width:560px;
    background:rgba(20,20,30,0.58);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:32px;
    padding:40px;
    text-align:center;
    box-shadow:
    0 15px 50px rgba(0,0,0,0.45),
    0 0 40px rgba(140,100,255,0.08);
    position:relative;
    z-index:10;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(20px); }
    to{ opacity:1; transform:translateY(0); }
}

.badge{
    display:inline-block;
    background:rgba(255,255,255,0.08);
    color:#ff9dc2;
    padding:8px 18px;
    border-radius:999px;
    font-size:0.9rem;
    font-weight:600;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.06);
}

h1{
    font-size:2.8rem;
    margin-bottom:15px;
    color:#ff8fb7;
    text-shadow:0 0 18px rgba(255,143,183,0.2);
}

.subtitle{
    font-size:1.08rem;
    line-height:1.8;
    color:#d4d4de;
    margin-bottom:30px;
}

.meme-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:20px;
    padding:18px;
    margin-bottom:25px;
    font-size:0.95rem;
    line-height:1.7;
    color:#cfcfe6;
}

/* inputs */
.calendar{
    text-align:left;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#f0f0f5;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    margin-bottom:18px;
    background:rgba(255,255,255,0.08);
    color:white;
    border:1px solid rgba(255,255,255,0.06);
}

/* buttons */
.buttons{
    display:flex;
    justify-content:center;
    gap:18px;
    position:relative;
    margin-top:10px;
}

button{
    border:none;
    border-radius:999px;
    padding:14px 28px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.25s;
}

.yes{
    background:linear-gradient(135deg,#ff5ca8,#9b6dff);
    color:white;
}

.yes:hover{
    transform:translateY(-3px) scale(1.04);
}

.no{
    background:rgba(255,255,255,0.08);
    color:#ff9dc2;
    position:absolute;
    right:0;
}

/* result */
.result{
    margin-top:28px;
    display:none;
    background:rgba(255,255,255,0.05);
    border-radius:22px;
    padding:20px;
    line-height:1.9;
    color:#ececf6;
}

/* footer */
.small{
    margin-top:25px;
    font-size:0.82rem;
    color:#8f8fa8;
}

/* mobile */
@media(max-width:600px){
    .card{ padding:28px; }
    h1{ font-size:2rem; }
}

</style>
</head>

<body>

<!-- EMO CREATURES -->
<div class="creature raven">🪶</div>
<div class="creature owl">🦉</div>

<div class="card">

    <div class="badge">verified cute invitation ✔</div>

    <h1>date request 💌</h1>

    <div class="subtitle">
        След дълги преговори с болния ми мозък,<br>
        мисля, че трябва да те поканя на среща 😌
    </div>

    <div class="meme-box">
        📊 cringe risk: 67%<br>
        ☕ caffeine overdose: 99%<br>
        ❤️ nervous energy: extremely high
    </div>

    <div class="calendar">

        <label>📅 Избери дата</label>
        <input type="date" id="date">

        <label>⏰ Избери час</label>
        <input type="time" id="time">

    </div>

    <div class="buttons">

        <button class="yes" id="yesBtn">yes 😎</button>
        <button class="no" id="noBtn">no 😭</button>

    </div>

    <div class="result" id="result"></div>

    <div class="small">powered by anxiety & ravens 🖤</div>

</div>

<script>

const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');
const result = document.getElementById('result');

const jokes = [
    "no is temporarily unavailable",
    "error 404 rejection not found",
    "nice try 😂",
    "system says YES",
    "blocked 🚨"
];

noBtn.addEventListener('mouseover', () => {

    const x = Math.random() * (window.innerWidth - 180);
    const y = Math.random() * (window.innerHeight - 120);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    noBtn.innerText = jokes[Math.floor(Math.random()*jokes.length)];
});

yesBtn.addEventListener('click', () => {

    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;

    if(!date || !time){
        alert("choose date & time 😭");
        return;
    }

    result.style.display = "block";
    result.innerHTML = `
        🖤 confirmed.<br><br>
        📅 ${date}<br>
        ⏰ ${time}<br><br>
        prepare for:<br>
        awkward silence,<br>
        memes,<br>
        overpriced coffee ☕
    `;
});

setInterval(() => {

    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.innerHTML = ["♥","♡","💗","💕"][Math.floor(Math.random()*4)];
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*25 + 15) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 10000);

},700);

</script>

</body>
</html>
